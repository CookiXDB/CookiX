name: Release

# On a version tag, build the wheel + sdist, validate them, and publish to PyPI
# using Trusted Publishing (OIDC) — no API token stored in the repo. The PyPI
# project must have this repository configured as a trusted publisher once, by a
# maintainer (see RELEASING.md).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Verify the wheel installs and runs in a clean venv
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/python -m pip install dist/*.whl
          /tmp/verify/bin/python -c "import cookix; db=cookix.connect('x'); \
            db.insert({'_id':'a','content':'a','edges':[('causes','b')]}); \
            db.insert({'_id':'b','content':'b'}); \
            assert db.query(anchor='a', target='b', mode='graph')[0].object_id=='b'; \
            print('wheel OK', cookix.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
